services:
  diun:
    image: crazymax/diun:4.33
    container_name: diun
    restart: unless-stopped
    command: serve
    mem_limit: 128m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    volumes:
      - ./data:/data
      - /var/run/docker.sock:/var/run/docker.sock:ro
    env_file: .env
    environment:
      - TZ=America/Chicago
      - DIUN_WATCH_WORKERS=4
      - DIUN_WATCH_SCHEDULE=0 8 * * *
      - DIUN_WATCH_JITTER=30s
      - DIUN_PROVIDERS_DOCKER=true
      - DIUN_PROVIDERS_DOCKER_WATCHBYDEFAULT=true
      - DIUN_NOTIF_NTFY_ENDPOINT=https://ntfy.hartforge.dev
      - DIUN_NOTIF_NTFY_TOPIC=homelab-news
      - DIUN_NOTIF_NTFY_PRIORITY=3
