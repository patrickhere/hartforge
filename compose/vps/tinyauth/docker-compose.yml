services:
  tinyauth:
    image: ghcr.io/tinyauthapp/tinyauth:v5.1.0
    container_name: tinyauth
    restart: unless-stopped
    env_file: .env
    mem_limit: 128m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    ports:
      - "127.0.0.1:3080:3000"
      - "172.16.98.2:3080:3000"
    volumes:
      - ./data:/data
