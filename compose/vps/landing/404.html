<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%23000000'/%3E%3Ctext x='30' y='44' font-family='SF Mono,Menlo,monospace' font-size='28' font-weight='600' fill='%23cba6f7' text-anchor='middle'%3Ehf%3C/text%3E%3Ctext x='52' y='30' font-family='SF Mono,Menlo,monospace' font-size='18' fill='%23fab387' text-anchor='middle'%3E*%3C/text%3E%3C/svg%3E">
<title>404 - hart forge</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000; color: #cdd6f4;
    font-family: "SF Mono", ui-monospace, "JetBrains Mono", Menlo, monospace;
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    padding: 2rem;
  }
  h1 { color: #f38ba8; font-size: 2rem; margin-bottom: 0.5rem; }
  p { color: #a6adc8; }
  .prompt { color: #a6e3a1; }
  a { color: #89b4fa; text-decoration: none; }
  a:hover { color: #fab387; }
  main img { display: block; image-rendering: pixelated; margin-bottom: 0.75rem; }
</style>
</head>
<body>
  <main>
    <h1>404 *</h1>
    <p><span class="prompt">-&gt;</span> psyduck is as confused as you are. nothing forged here. <a href="/">back to the anvil</a></p>
  </main>
  <script>
  (function () {
    var img = document.createElement('img');
    img.src = '/sprites/psyduck' + (Math.random() < 1 / 128 ? '-shiny' : '') + '.png';
    img.width = 96; img.height = 96; img.alt = 'a confused psyduck';
    document.querySelector('main').prepend(img);
  })();
  </script>
</body>
</html>
