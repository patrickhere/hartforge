<title>patrick hart - links</title>
<style>
  :root {
    --bg: #14161a;
    --surface: #1c1f25;
    --surface-hover: #22262e;
    --border: #2a2e36;
    --fg: #d8dbe0;
    --muted: #8b909a;
    --accent: #7aa2f7;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--fg);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    line-height: 1.6;
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: clamp(1.5rem, 4vw, 3rem) 1rem;
  }
  main { width: 100%; max-width: 26rem; text-align: center; }
  .mark {
    width: 64px; height: 64px;
    border-radius: 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--accent);
    font-family: "SF Mono", ui-monospace, Menlo, Consolas, monospace;
    font-size: 1.6rem; font-weight: 600;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 0.9rem;
  }
  h1 { font-family: "SF Mono", ui-monospace, Menlo, Consolas, monospace; font-size: 1.4rem; font-weight: 600; letter-spacing: -0.02em; }
  .tagline { color: var(--muted); font-size: 0.9rem; margin-bottom: 1.75rem; }
  .links { display: flex; flex-direction: column; gap: 0.7rem; }
  .links a {
    display: block;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 0.85rem 1.25rem;
    color: var(--fg);
    text-decoration: none;
    font-weight: 600;
    transition: border-color 0.15s ease, background 0.15s ease, transform 0.15s ease;
  }
  .links a:hover { border-color: var(--accent); background: var(--surface-hover); transform: translateY(-1px); }
  .links a .sub { display: block; color: var(--muted); font-size: 0.8rem; font-weight: 400; }
  footer { margin-top: 1.75rem; font-size: 0.8rem; color: var(--muted); }
  footer a { color: var(--accent); text-decoration: none; }
  footer a:hover { text-decoration: underline; }
</style>
</head>
<body>
<main>
  <div class="mark">ph</div>
  <h1>patrick hart</h1>
  <p class="tagline">infrastructure engineer, sysadmin, tinkerer</p>

  </nav>
  <footer>
    <a href="/">the full site &rarr;</a>
  </footer>
</main>
