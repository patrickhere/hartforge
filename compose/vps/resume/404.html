<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%2314161a'/%3E%3Ctext x='32' y='44' font-family='SF Mono,Menlo,Consolas,monospace' font-size='26' font-weight='600' fill='%237aa2f7' text-anchor='middle'%3Eph%3C/text%3E%3C/svg%3E">
<title>404 - patrick hart</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #14161a; color: #d8dbe0;
    font-family: "SF Mono", ui-monospace, Menlo, Consolas, monospace;
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    padding: 2rem;
  }
  main { max-width: 40rem; width: 100%; font-size: 0.95rem; line-height: 2; overflow-wrap: break-word; }
  .user { color: #7aa2f7; }
  .err { color: #8b909a; }
  .status { font-size: 1.6rem; color: #8b909a; }
  .status .code { color: #7aa2f7; font-weight: 600; }
  a { color: #7aa2f7; text-decoration: none; }
  a:hover { text-decoration: underline; }
  .cursor { color: #7aa2f7; animation: blink 1.2s steps(1) infinite; }
  @keyframes blink { 50% { opacity: 0; } }
  @media (prefers-reduced-motion: reduce) { .cursor { animation: none; } }
</style>
</head>
<body>
<main>
  <p><span class="user">patrick@hartforge</span>:~$ curl -I https://hartforge.com<span class="miss">/404</span></p>
  <p class="status">HTTP/2 <span class="code">404</span></p>
  <p class="err">not found: the page moved, never existed, or got typo'd</p>
  <p><span class="user">patrick@hartforge</span>:~$ <a href="/">cd ~</a><span class="cursor">_</span></p>
</main>
<script>
(function () {
  var path = location.pathname || '/404';
  if (path.length > 60) path = path.slice(0, 57) + '...';
  document.querySelectorAll('.miss').forEach(function (el) { el.textContent = path; });
})();
</script>
</body>
</html>
