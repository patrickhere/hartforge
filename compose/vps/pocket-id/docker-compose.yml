services:
  pocket-id:
    image: ghcr.io/pocket-id/pocket-id:v2.11.0
    container_name: pocket-id
    restart: unless-stopped
    env_file: .env
    mem_limit: 256m
    security_opt:
      - no-new-privileges:true
    labels:
      - autoheal=true
    ports:
      - "127.0.0.1:1411:1411"
      - "172.16.98.2:1411:1411"
    volumes:
      - ./data:/app/data
    healthcheck:
      test: [CMD, /app/pocket-id, healthcheck]
      interval: 1m30s
      timeout: 5s
      retries: 2
      start_period: 10s
