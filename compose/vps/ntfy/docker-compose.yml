services:
  ntfy:
    image: binwiederhier/ntfy:v2.25.0
    container_name: ntfy
    restart: unless-stopped
    command: serve
    mem_limit: 256m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    healthcheck:
      test: ["CMD-SHELL", "wget -q --tries=1 -O - http://localhost:80/v1/health | grep -q '\"healthy\":true' || exit 1"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 15s
    ports:
      - 127.0.0.1:2586:80
    volumes:
      - ./cache:/var/cache/ntfy
      - ./config:/etc/ntfy
    environment:
      TZ: America/Chicago
