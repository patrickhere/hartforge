# crucible -- hartforge media stack
# replaces YAMS. managed via homelab-compose repo.
# deploy: docker compose up -d
# update: docker compose pull <service> && docker compose up -d <service>

name: crucible

services:

  # ── Media Server ──────────────────────────────────────────────

  jellyfin:
    image: lscr.io/linuxserver/jellyfin:10.11.11ubu2404-ls41
    container_name: jellyfin
    # runtime: nvidia  # GPU absent since 07-2026 revival
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - VERSION=docker
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ${MEDIA_DIRECTORY}:/data
      - ${INSTALL_DIRECTORY}/config/jellyfin:/config
    ports:
      - "10.1.0.52:8096:8096"
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

  # ── Arr Stack ─────────────────────────────────────────────────

  sonarr:
    image: lscr.io/linuxserver/sonarr:4.0.19.2979-ls319
    container_name: sonarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ${MEDIA_DIRECTORY}:/data
      - ${INSTALL_DIRECTORY}/config/sonarr:/config
    ports:
      - 8989:8989
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

  radarr:
    image: lscr.io/linuxserver/radarr:6.3.0.10514-ls311
    container_name: radarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ${MEDIA_DIRECTORY}:/data
      - ${INSTALL_DIRECTORY}/config/radarr:/config
    ports:
      - 7878:7878
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

  bazarr:
    image: lscr.io/linuxserver/bazarr:v1.6.0-ls355
    container_name: bazarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ${MEDIA_DIRECTORY}:/data
      - ${INSTALL_DIRECTORY}/config/bazarr:/config
    ports:
      - 6767:6767
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:2.4.0.5397-ls154
    container_name: prowlarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ${INSTALL_DIRECTORY}/config/prowlarr:/config
    ports:
      - 9696:9696
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

  # ── Download Clients ──────────────────────────────────────────

  sabnzbd:
    image: lscr.io/linuxserver/sabnzbd:5.0.4-ls262
    container_name: sabnzbd
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ${MEDIA_DIRECTORY}:/data
      - ${INSTALL_DIRECTORY}/config/sabnzbd:/config
    ports:
      - 8080:8080
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

  unpackerr:
    image: ghcr.io/unpackerr/unpackerr:v0.15.2
    container_name: unpackerr
    environment:
      - TZ=${TZ}
      - UN_SONARR_0_URL=http://sonarr:8989
      - UN_SONARR_0_API_KEY=${SONARR_API_KEY}
      - UN_RADARR_0_URL=http://radarr:7878
      - UN_RADARR_0_API_KEY=${RADARR_API_KEY}
      - UN_SABNZBD_0_URL=http://sabnzbd:8080
      - UN_SABNZBD_0_API_KEY=${SABNZBD_API_KEY}
    volumes:
      - ${MEDIA_DIRECTORY}:/data
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

  # ── Media Utilities ───────────────────────────────────────────

  seerr:
    image: ghcr.io/seerr-team/seerr:v3.3.0
    container_name: seerr
    init: true
    environment:
      - TZ=${TZ}
    volumes:
      - ${INSTALL_DIRECTORY}/config/seerr:/app/config
    ports:
      - 5055:5055
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:5055/api/v1/status || exit 1
      start_period: 20s
      timeout: 3s
      interval: 15s
      retries: 3
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

  recyclarr:
    image: ghcr.io/recyclarr/recyclarr:8.7.0
    container_name: recyclarr
    environment:
      - TZ=${TZ}
    volumes:
      - ${INSTALL_DIRECTORY}/config/recyclarr:/config
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

  profilarr:
    image: ghcr.io/dictionarry-hub/profilarr:latest
    container_name: profilarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TZ}
      - PARSER_HOST=profilarr-parser
      - PARSER_PORT=5000
    volumes:
      - ${INSTALL_DIRECTORY}/config/profilarr-v2:/config
    ports:
      - 6868:6868
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    depends_on:
      profilarr-parser:
        condition: service_healthy

  profilarr-parser:
    image: ghcr.io/dictionarry-hub/profilarr-parser:latest
    container_name: profilarr-parser
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

  jellystat-db:
    image: postgres:16-alpine
    container_name: jellystat-db
    environment:
      - POSTGRES_DB=jfstat
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${JELLYSTAT_POSTGRES_PASSWORD}
    volumes:
      - ${INSTALL_DIRECTORY}/config/jellystat-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d jfstat"]
      interval: 10s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

  jellystat:
    image: cyfershepard/jellystat:1.1.11
    container_name: jellystat
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${JELLYSTAT_POSTGRES_PASSWORD}
      - POSTGRES_IP=jellystat-db
      - POSTGRES_PORT=5432
      - JWT_SECRET=${JELLYSTAT_JWT_SECRET}
    volumes:
      - ${INSTALL_DIRECTORY}/config/jellystat:/app/backend/backup-data
    ports:
      - 3000:3000
    depends_on:
      jellystat-db:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

  # ── Live TV ───────────────────────────────────────────────

  tunarr:
    image: chrisbenincasa/tunarr:1.3.8
    container_name: tunarr
    # runtime: nvidia  # GPU absent since 07-2026 revival
    environment:
      - TZ=${TZ}
      - TUNARR_SERVER_TRUST_PROXY=true
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ${INSTALL_DIRECTORY}/config/tunarr:/config/tunarr
      - ${MEDIA_DIRECTORY}:/data:ro
    ports:
      - 8000:8000
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

  # ── Poster Management ────────────────────────────────────────

  posterizarr:
    image: ghcr.io/fscorrupt/posterizarr:latest
    container_name: posterizarr
    environment:
      - TZ=${TZ}
      - TERM=xterm
      - RUN_TIME=disabled
    user: "${PUID}:${PGID}"
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ${INSTALL_DIRECTORY}/config/posterizarr:/config
      - ${INSTALL_DIRECTORY}/config/posterizarr/assets:/assets
      - ${INSTALL_DIRECTORY}/config/posterizarr/assetsbackup:/assetsbackup
      - ${INSTALL_DIRECTORY}/config/posterizarr/manualassets:/manualassets
    ports:
      - 8400:8000
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

  # ── Observability ─────────────────────────────────────────────

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    network_mode: host
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --path.rootfs=/rootfs
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)
    read_only: true
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

  alloy:
    image: grafana/alloy:latest
    container_name: alloy
    volumes:
      - ${INSTALL_DIRECTORY}/config/alloy/config.alloy:/etc/alloy/config.alloy
      - /var/log:/var/log:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: run /etc/alloy/config.alloy
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
    ports:
      - 8088:8080
    read_only: true
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

  exportarr-sonarr:
    image: ghcr.io/onedr0p/exportarr:latest
    container_name: exportarr-sonarr
    command: sonarr
    environment:
      - PORT=9707
      - URL=http://sonarr:8989
      - API_KEY=${SONARR_API_KEY}
    ports:
      - 9707:9707
    read_only: true
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

  exportarr-radarr:
    image: ghcr.io/onedr0p/exportarr:latest
    container_name: exportarr-radarr
    command: radarr
    environment:
      - PORT=9708
      - URL=http://radarr:7878
      - API_KEY=${RADARR_API_KEY}
    ports:
      - 9708:9708
    read_only: true
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

  exportarr-prowlarr:
    image: ghcr.io/onedr0p/exportarr:latest
    container_name: exportarr-prowlarr
    command: prowlarr
    environment:
      - PORT=9709
      - URL=http://prowlarr:9696
      - API_KEY=${PROWLARR_API_KEY}
    ports:
      - 9709:9709
    read_only: true
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

  exportarr-sabnzbd:
    image: ghcr.io/onedr0p/exportarr:latest
    container_name: exportarr-sabnzbd
    command: sabnzbd
    environment:
      - PORT=9711
      - URL=http://sabnzbd:8080
      - API_KEY=${SABNZBD_API_KEY}
    ports:
      - 9711:9711
    read_only: true
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

  # ── Transcode Automation ─────────────────────────────────────

  tdarr:
    image: ghcr.io/haveagitgat/tdarr:2.83.01
    container_name: tdarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - UMASK_SET=002
      - serverIP=0.0.0.0
      - serverPort=8266
      - webUIPort=8265
      - internalNode=true
      - inContainer=true
      - ffmpegVersion=7
      - nodeName=CrucibleNode
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ${INSTALL_DIRECTORY}/config/tdarr/server:/app/server
      - ${INSTALL_DIRECTORY}/config/tdarr/configs:/app/configs
      - ${INSTALL_DIRECTORY}/config/tdarr/logs:/app/logs
      - ${MEDIA_DIRECTORY}:/data
      - ${INSTALL_DIRECTORY}/config/tdarr/transcode_cache:/temp
    ports:
      - 8265:8265
      - 8266:8266
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

  diun:
    image: crazymax/diun:latest
    container_name: diun
    environment:
      - TZ=${TZ}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ${INSTALL_DIRECTORY}/config/diun:/data
      - ${INSTALL_DIRECTORY}/config/diun/diun.yml:/diun.yml:ro
      - ${INSTALL_DIRECTORY}/secrets/ntfy-token:/run/secrets/ntfy-token:ro
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

  wizarr:
    image: ghcr.io/wizarrrr/wizarr:v2026.7.1
    container_name: wizarr
    environment:
      - TZ=${TZ}
    volumes:
      - ${INSTALL_DIRECTORY}/config/wizarr:/data/database
    ports:
      - 5690:5690
    restart: unless-stopped

  # ── Stream Monitoring ────────────────────────────────────────

  tracearr:
    image: ghcr.io/connorgallopo/tracearr:supervised-1.5.0
    container_name: tracearr
    shm_size: 512mb
    mem_limit: 3g
    environment:
      - TZ=${TZ}
    volumes:
      - ${INSTALL_DIRECTORY}/config/tracearr/postgres:/data/postgres
      - ${INSTALL_DIRECTORY}/config/tracearr/redis:/data/redis
      - ${INSTALL_DIRECTORY}/config/tracearr/data:/data/tracearr
      - ${INSTALL_DIRECTORY}/config/tracearr/backup:/data/backup
    ports:
      - 3001:3000
    restart: unless-stopped

