server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: system
    static_configs:
      - targets:
          - localhost
        labels:
          host: monitoring
          job: syslog
          __path__: /var/log/syslog
      - targets:
          - localhost
        labels:
          host: monitoring
          job: auth
          __path__: /var/log/auth.log

  - job_name: docker
    static_configs:
      - targets:
          - localhost
        labels:
          host: monitoring
          job: docker
          __path__: /var/lib/docker/containers/*/*.log
    pipeline_stages:
      - docker: {}
