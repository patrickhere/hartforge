global:
  scrape_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: node-exporter
    static_configs:
      - targets: ["node-exporter:9100"]
        labels:
          instance: monitoring
      - targets: ["10.1.0.50:9100"]
        labels:
          instance: prox-svr1
      - targets: ["10.1.0.52:9100"]
        labels:
          instance: yams
      - targets: ["10.1.0.53:9100"]
        labels:
          instance: uptime-kuma
      - targets: ["10.1.0.54:9100"]
        labels:
          instance: homepage
      - targets: ["10.1.0.56:9100"]
        labels:
          instance: forgejo
    relabel_configs:
      - source_labels: [instance]
        target_label: instance

  - job_name: cadvisor
    static_configs:
      - targets: ["10.1.0.52:8088"]
        labels:
          instance: yams
