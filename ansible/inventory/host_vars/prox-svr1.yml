---
svc_name: PVE
svc_check: "systemctl is-active pveproxy"
proxmox_node: prox-svr1
proxmox_api_host: "10.1.0.50"
proxmox_api_user: "root@pam"
proxmox_api_token_id: "ansible"
proxmox_api_token_secret: "{{ prox_svr1_api_token_secret }}"
# prox_svr1_api_token_secret is in vars/secrets.yml (vault-encrypted)

backup_files:
  - { src: "/etc/pve/storage.cfg", dest: "proxmox/storage.cfg" }
  - { src: "/etc/pve/user.cfg", dest: "proxmox/user.cfg" }

# LXC definitions for IaC provisioning
lxc_definitions:
  - vmid: 100
    hostname: caddy
    ip: "10.1.0.51/24"
    gw: "10.1.0.1"
    cores: 2
    memory: 1024
    disk: "local-lvm:8"
    template: "local:vztmpl/debian-12-standard_12.12-1_amd64.tar.zst"
    tags: "proxy"
    onboot: true
    docker: false
    alloy: false

  - vmid: 103
