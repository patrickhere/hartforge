---
- name: Remove default MOTD scripts
  ansible.builtin.file:
    path: "/etc/update-motd.d/{{ item }}"
    state: absent
  loop:
    - 10-uname
    - 50-motd-news
    - 92-unattended-upgrades
  failed_when: false
  tags: [motd]

- name: Fetch Hart Forge MOTD script on controller
  ansible.builtin.shell: >
    /Users/admin/bin/forgejo-cli raw GET "{{ motd_api_path }}"
    | python3 -c "import json,sys,base64; sys.stdout.write(base64.b64decode(json.load(sys.stdin)['content']).decode())"
    > {{ motd_fetch_dest }}
  delegate_to: localhost
  run_once: true
  become: false
  changed_when: false
  tags: [motd]

- name: Install Hart Forge MOTD script
  ansible.builtin.copy:
    src: "{{ motd_fetch_dest }}"
    dest: /etc/update-motd.d/10-hartforge
    mode: '0755'
  tags: [motd]

- name: Create hartforge.conf for service check
  ansible.builtin.copy:
    dest: /etc/hartforge.conf
    content: |
      SVC_NAME="{{ svc_name | default('') }}"
      SVC_CHECK="{{ svc_check | default('') }}"
    mode: '0644'
  when: svc_name is defined
  tags: [motd]

- name: Disable default Debian MOTD
  ansible.builtin.file:
    path: /etc/motd
    state: absent
  failed_when: false
  tags: [motd]

- name: Ensure pam_motd runs update-motd.d scripts
  ansible.builtin.lineinfile:
    path: /etc/pam.d/sshd
    regexp: 'pam_motd.so.*motd=/run/motd.dynamic'
    line: 'session    optional     pam_motd.so  motd=/run/motd.dynamic'
    state: present
  failed_when: false
  tags: [motd]
